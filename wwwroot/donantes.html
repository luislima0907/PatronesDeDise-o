<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gestión de Donantes - Sistema Donación</title>
  <link rel="stylesheet" href="./css/dashboard.css" />
  <style>
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      border-bottom: 2px solid #e0e0e0;
    }

    .tab-btn {
      padding: 0.75rem 1.5rem;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      color: #666;
      transition: all 0.3s ease;
    }

    .tab-btn.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .tab-btn:hover {
      color: #667eea;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #333;
    }

    input, select, textarea {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.95rem;
      box-sizing: border-box;
      font-family: inherit;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
    }

    .btn-secondary {
      background: #e0e0e0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #d0d0d0;
    }

    .btn-danger {
      background: #dc3545;
      color: white;
    }

    .btn-danger:hover {
      background: #b02a37;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .alert {
      padding: 1rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      border-left: 4px solid;
    }

    .alert-success {
      background: #d4edda;
      border-color: #28a745;
      color: #155724;
    }

    .alert-error {
      background: #f8d7da;
      border-color: #dc3545;
      color: #721c24;
    }

    .alert-info {
      background: #d1ecf1;
      border-color: #17a2b8;
      color: #0c5460;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1.5rem;
    }

    th {
      background: #f5f5f5;
      padding: 1rem;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid #ddd;
      color: #333;
    }

    td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #ddd;
    }

    tr:hover {
      background: #fafafa;
    }

    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .badge-disponible {
      background: #d4edda;
      color: #155724;
    }

    .badge-asignado {
      background: #fff3cd;
      color: #856404;
    }

    .badge-rechazado {
      background: #f8d7da;
      color: #721c24;
    }

    .badge-descartado {
      background: #e2e3e5;
      color: #383d41;
    }

    .badge-trasplantado {
      background: #cfe2ff;
      color: #084298;
    }

    .action-buttons {
      display: flex;
      gap: 0.5rem;
    }

    .action-buttons button {
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
    }

    .loading {
      display: inline-block;
      width: 1rem;
      height: 1rem;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.3s ease;
    }

    .modal.show {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      max-width: 500px;
      width: 90%;
      animation: slideUp 0.3s ease;
    }

    .modal-header {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: #333;
    }

    .modal-body {
      margin-bottom: 1.5rem;
      color: #666;
    }

    .modal-footer {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .tabs {
        flex-wrap: wrap;
      }

      table {
        font-size: 0.9rem;
      }

      td, th {
        padding: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏥 Gestión de Donantes y Órganos</h1>

    <div id="message"></div>

    <!-- Tabs de navegación -->
    <div class="tabs">
      <button class="tab-btn active" onclick="mostrarTab('registrar-donante')">Registrar Donante</button>
      <button class="tab-btn" onclick="mostrarTab('listar-donantes')">Listar Donantes</button>
      <button class="tab-btn" onclick="mostrarTab('registrar-organo')">Registrar Órgano</button>
      <button class="tab-btn" onclick="mostrarTab('listar-organos')">Listar Órganos</button>
    </div>

    <!-- Tab: Registrar Donante -->
    <div id="registrar-donante" class="tab-content active">
      <h2>Registrar Nuevo Donante</h2>
      <form id="formDonante" onsubmit="registrarDonante(event)">
        <div class="form-row">
          <div class="form-group">
            <label for="nombre">Nombre Completo *</label>
            <input type="text" id="nombre" name="nombre" required />
          </div>
          <div class="form-group">
            <label for="edad">Edad *</label>
            <input type="number" id="edad" name="edad" min="1" max="120" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="tipoSanguineo">Tipo de Sangre *</label>
            <select id="tipoSanguineo" name="tipoSanguineo" required>
              <option value="">Seleccionar...</option>
              <option value="O+">O+</option>
              <option value="O-">O-</option>
              <option value="A+">A+</option>
              <option value="A-">A-</option>
              <option value="B+">B+</option>
              <option value="B-">B-</option>
              <option value="AB+">AB+</option>
              <option value="AB-">AB-</option>
            </select>
          </div>
          <div class="form-group">
            <label for="hospitalId">Hospital *</label>
            <select id="hospitalId" name="hospitalId" required>
              <option value="">Cargando hospitales...</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="observaciones">Observaciones</label>
          <textarea id="observaciones" name="observaciones"></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Registrar Donante</button>
      </form>
    </div>

    <!-- Tab: Listar Donantes -->
    <div id="listar-donantes" class="tab-content">
      <h2>Donantes Registrados</h2>
      <button class="btn btn-secondary" onclick="cargarDonantes()">Actualizar</button>
      <div id="donantes-container">
        <p style="text-align: center; color: #999;">Cargando...</p>
      </div>
    </div>

    <!-- Tab: Registrar Órgano -->
    <div id="registrar-organo" class="tab-content">
      <h2>Registrar Nuevo Órgano</h2>
      <form id="formOrgano" onsubmit="registrarOrgano(event)">
        <div class="form-row">
          <div class="form-group">
            <label for="donanteId">Donante *</label>
            <select id="donanteId" name="donanteId" required>
              <option value="">Cargando donantes...</option>
            </select>
          </div>
          <div class="form-group">
            <label for="tipoOrgano">Tipo de Órgano *</label>
            <select id="tipoOrgano" name="tipoOrgano" required>
              <option value="">Seleccionar...</option>
              <option value="Corazón">Corazón</option>
              <option value="Pulmón">Pulmón</option>
              <option value="Hígado">Hígado</option>
              <option value="Riñón">Riñón</option>
              <option value="Páncreas">Páncreas</option>
              <option value="Córnea">Córnea</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="compatibilidad">Datos de Compatibilidad (JSON)</label>
          <textarea id="compatibilidad" name="compatibilidad" placeholder='{"tipo": "valor"}'></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Registrar Órgano</button>
      </form>
    </div>

    <!-- Tab: Listar Órganos -->
    <div id="listar-organos" class="tab-content">
      <h2>Órganos Registrados</h2>
      <button class="btn btn-secondary" onclick="cargarOrganos()">Actualizar</button>
      <div id="organos-container">
        <p style="text-align: center; color: #999;">Cargando...</p>
      </div>
    </div>
  </div>

  <!-- Modal para cambiar estado -->
  <div id="modalEstado" class="modal">
    <div class="modal-content">
      <div class="modal-header">Cambiar Estado</div>
      <div class="modal-body">
        <div class="form-group">
          <label for="selectEstado">Nuevo Estado</label>
          <select id="selectEstado"></select>
        </div>
        <div class="form-group">
          <label for="observacionesEstado">Observaciones</label>
          <textarea id="observacionesEstado"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="guardarCambioEstado()">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Modal para confirmación de eliminación -->
  <div id="modalConfirmacion" class="modal">
    <div class="modal-content">
      <div class="modal-header">⚠️ Confirmar Eliminación</div>
      <div class="modal-body">
        <p id="mensajeConfirmacion">¿Está seguro de que desea eliminar este elemento? Esta acción no se puede deshacer.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="cerrarModalConfirmacion()">Cancelar</button>
        <button class="btn btn-danger" onclick="confirmarEliminacion()">Eliminar</button>
      </div>
    </div>
  </div>

  <button class="logout-btn" id="btnLogout" onclick="cerrarSesion()">Cerrar sesión</button>

  <script src="./js/dashboard.js"></script>
  <script src="./js/donantes.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Iniciar Sesión - Sistema de Donación de Órganos">
    <title>Iniciar Sesión - Sistema de Donación de Órganos</title>
    <link rel="stylesheet" href="./css/login.css">
</head>
<body>
    <div class="login-wrapper">
        <!-- Fondo animado -->
        <div class="background-gradient"></div>

        <!-- Contenedor principal -->
        <div class="login-container">
            <!-- Encabezado con logo -->
            <div class="login-header">
                <div class="logo-icon">🏥</div>
                <h1 class="login-title">
                    <span class="title-text">Sistema de</span>
                    <span class="title-accent">Donación de Órganos</span>
                </h1>
                <p class="login-subtitle">Centro de Coordinación y Gestión</p>
            </div>

            <!-- Formulario de login -->
            <form id="loginForm" class="login-form" novalidate>
                <!-- Campo Usuario -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input 
                            type="text" 
                            id="username" 
                            class="input-field"
                            placeholder="Nombre de usuario"
                            autocomplete="username"
                            required
                            aria-label="Nombre de usuario"
                        />
                        <span class="validation-icon" id="usernameValidation"></span>
                    </div>
                    <div class="error-message" id="usernameError" role="alert"></div>
                </div>

                <!-- Campo Contraseña -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input 
                            type="password" 
                            id="password" 
                            class="input-field"
                            placeholder="Contraseña"
                            autocomplete="current-password"
                            required
                            minlength="6"
                            aria-label="Contraseña"
                        />
                        <button 
                            type="button" 
                            class="toggle-password"
                            id="togglePassword"
                            aria-label="Mostrar/ocultar contraseña"
                            title="Mostrar/ocultar contraseña"
                        >
                            👁️
                        </button>
                        <span class="validation-icon" id="passwordValidation"></span>
                    </div>
                    <div class="error-message" id="passwordError" role="alert"></div>
                </div>

                <!-- Botón de envío -->
                <button id="submitBtn" type="submit" class="submit-button">
                    <span class="button-text">Iniciar Sesión</span>
                    <span class="button-spinner" style="display: none;"></span>
                </button>

                <!-- Mensaje de estado -->
                <div id="message" class="message-container" role="status" aria-live="polite"></div>
            </form>

            <!-- Información de credenciales de prueba -->
            <div class="credentials-info">
                <details>
                    <summary>📋 Credenciales de prueba</summary>
                    <div class="credentials-list">
                        <div class="credential-item">
                            <span class="credential-role">Administrador:</span>
                            <code>admin / Admin123!</code>
                        </div>
                        <div class="credential-item">
                            <span class="credential-role">Médico:</span>
                            <code>medico1 / Medico123!</code>
                        </div>
                    </div>
                </details>
            </div>
        </div>

        <!-- Footer -->
        <footer class="login-footer">
            <p>&copy; 2026 Sistema de Donación de Órganos. Todos los derechos reservados.</p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="./js/login.js"></script>
</body>
</html>
